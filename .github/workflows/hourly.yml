name: Hourly portfolio check

on:
  schedule:
    # Tiap jam, di menit ke-0
    - cron: "0 * * * *"
  # Allow manual trigger dari GitHub UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit hourly-check endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://arian-the-chain-portfolio.vercel.app/api/cron/hourly-check")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Endpoint returned $status"
            exit 1
          fi
